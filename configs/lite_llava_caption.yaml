model:
  vision_model: google/siglip2-so400m-patch16-512
  language_model: sbintuitions/sarashina2.2-0.5b-instruct-v0.1
  torch_dtype: bf16
  projector_type: mlp
  projector_layer_norm: true
  projector_dropout: 0.05
  num_image_tokens: 1024
  freeze_vision: true
  freeze_language_model: true
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05

data:
  train_jsonl: /media/ozakiy/Data/dejima_small.jsonl
  val_jsonl:
  image_root:
  caption_key: text
  image_key: image
  prompt: "画像を日本語で説明してください。"
  max_text_length: 256
  num_workers: 2

train:
  output_dir: /mnt/nvme1n1/lite-captioner
  epochs: 3
  batch_size: 2
  gradient_accumulation_steps: 1
  optimizer: adamw
  learning_rate: 0.0001
  weight_decay: 0.00
  lr_scheduler: constant_with_warmup
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  mixed_precision: bf16
  require_cuda: true
  log_every: 20
  save_every_steps: 5000
  seed: 42
